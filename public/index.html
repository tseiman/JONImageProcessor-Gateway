<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JONImageProcessor Control</title>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <div class="topbar">
    <div class="brand">
      <img src="/img/logo.svg" alt="">
      <div>
        <b>JONImageProcessor</b>
        <span>Gateway Control</span>
      </div>
    </div>
    <div id="message" class="message" aria-live="polite"></div>
    <div class="status">
      <b id="connectionStatus">Disconnected</b>
      <span id="fpsStatus" class="metric-status fps-status">
        <span class="fps-label">FPS --</span>
        <svg class="metric-sparkline fps-sparkline" viewBox="0 0 40 14" aria-hidden="true">
          <polygon points=""></polygon>
          <polyline points=""></polyline>
        </svg>
      </span>
      <span id="cpuStatus" class="metric-status cpu-status">
        <span class="cpu-label">CPU --</span>
        <svg class="metric-sparkline cpu-sparkline" viewBox="0 0 40 14" aria-hidden="true">
          <polygon points=""></polygon>
          <polyline points=""></polyline>
        </svg>
      </span>
      <span id="memoryStatus">MEM --</span>
      <span id="latencyStatus">Latency --</span>
      <img id="secondScreenStatus" class="screen-status-icon" src="/img/single-screen.svg" alt="Single screen" title="Single screen">
      <span id="jipVersionStatus">JIP git --</span>
      <span id="versionStatus">Version --</span>
      <button id="settingsButton" class="icon-button status-icon" title="Settings" aria-label="Settings">⚙</button>
      <button id="refreshButton" class="icon-button status-icon" title="Refresh" aria-label="Refresh">↻</button>
    </div>
  </div>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <h3>PRESETS</h3>
      </div>
      <div id="presetList" class="preset-list"></div>
      <hr>
      <button id="savePresetButton" class="action">Save Preset</button>
      <div class="preset-tools">
        <button id="importPresetsButton" class="action">Import</button>
        <button id="exportPresetsButton" class="action">Export</button>
      </div>
      <input id="importPresetsInput" class="hidden-file" type="file" accept="application/json,.json">
    </aside>

    <main>
      <div id="stages" class="stages"></div>
    </main>
  </div>

  <dialog id="settingsDialog" class="settings-dialog">
    <form method="dialog">
      <div class="dialog-head">
        <h2>Settings</h2>
        <button value="close" class="icon-button" aria-label="Close">×</button>
      </div>
      <label class="field">
        <span>API Token</span>
        <input id="tokenInput" type="password" autocomplete="current-password">
      </label>
      <label class="checkbox">
        <input id="showTokenInput" type="checkbox">
        <span>Show token</span>
      </label>
      <label class="field">
        <span>Control confirmation timeout (ms)</span>
        <input id="confirmTimeoutInput" type="number" min="500" max="15000" step="100">
      </label>
      <label class="checkbox">
        <input id="autoApplyDefaultPresetInput" type="checkbox">
        <span>Apply default preset on startup</span>
      </label>
      <div class="dialog-actions">
        <button id="clearTokenButton" value="clear" class="secondary">Clear</button>
        <button id="saveTokenButton" value="save" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="presetDialog" class="settings-dialog">
    <form id="presetForm" method="dialog">
      <div class="dialog-head">
        <h2 id="presetDialogTitle">Save Preset</h2>
        <button id="closePresetDialogButton" type="button" class="icon-button" aria-label="Close">×</button>
      </div>
      <label class="field">
        <span>Name</span>
        <input id="presetNameInput" type="text" autocomplete="off">
      </label>
      <div class="dialog-actions">
        <button id="cancelPresetDialogButton" type="button" class="secondary">Cancel</button>
        <button id="confirmSavePresetButton" type="submit" value="save" class="primary">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="defaultPresetDialog" class="settings-dialog">
    <form method="dialog">
      <div class="dialog-head">
        <h2>Default Preset</h2>
      </div>
      <p class="dialog-copy">Do you want to apply saved default presets?</p>
      <div class="dialog-actions">
        <button id="skipDefaultPresetButton" value="no" class="secondary">No</button>
        <button id="applyDefaultPresetButton" value="yes" class="primary">Yes</button>
      </div>
    </form>
  </dialog>

  <script src="/js/app.js" type="module"></script>
</body>
</html>
